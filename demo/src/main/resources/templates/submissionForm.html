<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Employee Registration</title>
    <link rel="stylesheet" th:href="@{/css/formStyle.css}"/>
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
</head>
<body class="form-page">

    <div class="card">
        <h1>Employee Registration</h1>
        <p class="subtitle">Fill in the details below to register an employee.</p>

        <form id="employeeForm" action="/submit" method="post" th:object="${employee}">

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" th:field="*{employeeName}" placeholder="e.g. Risha Gupta" required/>
            </div>

            <div class="form-group">
                <label>Gender</label>
                <div class="radio-group">
                    <label for="male"><input type="radio" th:field="*{gender}" value="Male" id="male"/> Male</label>
                    <label for="female"><input type="radio" th:field="*{gender}" value="Female" id="female" required/> Female</label>
                </div>
            </div>

            <div class="form-group">
                <label>Department</label>
                <select id="department" name="department" multiple="multiple" style="width:100%" required>
                    <option value="HR">HR (Human Resources)</option>
                    <option value="IT">IT (Information Technology)</option>
                    <option value="Finance">Finance</option>
                    <option value="Marketing">Marketing</option>
                    <option value="Sales">Sales</option>
                    <option value="Design">Design</option>
                    <option value="Support">Support</option>
                </select>
            </div>

            <div class="form-group">
                <label>Joining Date</label>
                <input type="date" th:field="*{joiningDate}" required/>
            </div>

            <div class="form-group">
                <div class="checkbox-group">
                    <input type="checkbox" th:field="*{fullTime}" id="fullTime"/>
                    <label for="fullTime">Full Time Employee</label>
                </div>
            </div>

            <div class="button-row">
                <button type="button" class="btn-submit" onclick="confirmSubmit()">Submit</button>
                <button type="button" class="btn-clear" onclick="confirmClear()">Clear</button>
            </div>

        </form>

        <a href="/resultsPage" class="view-results">View Submitted Results</a>
    </div>

    <div id="submitModal" class="modal-overlay" style="display:none;">
        <div class="modal-box">
            <p class="modal-message">Are you sure you want to submit the form?</p>
            <div class="modal-actions">
                <button class="modal-btn modal-btn-confirm" onclick="doSubmit()">Yes, Submit</button>
                <button class="modal-btn modal-btn-cancel" onclick="closeModal('submitModal')">Cancel</button>
            </div>
        </div>
    </div>

    <div id="clearModal" class="modal-overlay" style="display:none;">
        <div class="modal-box">
            <p class="modal-message">Are you sure you want to clear all form data?</p>
            <div class="modal-actions">
                <button class="modal-btn modal-btn-confirm" onclick="doClear()">Yes, Clear</button>
                <button class="modal-btn modal-btn-cancel" onclick="closeModal('clearModal')">Cancel</button>
            </div>
        </div>
    </div>

    <script th:src="@{/js/formScript.js}"></script>

</body>
</html>
